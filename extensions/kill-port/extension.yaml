# cai-extension
name: Kill Port
description: Kill the process running on a given port number
author: cai-layer
version: "1.0"
tags: [developer, system]
icon: xmark.circle.fill
type: shell
shell: lsof -ti :{{result}} | xargs kill -9 && echo "Killed process on port {{result}}" || echo "No process found on port {{result}}"
