# cai-extension
name: Make Longer
description: Expand text with more detail and clarity
author: clipboard-ai
version: "1.0"
tags: [writing, editing]
icon: text.badge.plus
type: prompt
prompt: |
  Expand this text to be roughly 50% longer. Add clarity, supporting details, or smoother transitions where appropriate. Do not add filler, repetition, or unrelated content. Keep the original meaning, tone, and style. Do not use any markdown formatting.
