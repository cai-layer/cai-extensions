# cai-extension
name: Explain Like I'm Five
description: Simplify complex text into plain, easy-to-understand language
author: cai-layer
version: "1.0"
tags: [writing, learning]
icon: lightbulb.fill
type: prompt
prompt: |
  Explain this in simple terms that a five-year-old could understand. Use short sentences, everyday words, and analogies where helpful. Do not use any markdown formatting.
